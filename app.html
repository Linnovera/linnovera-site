<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinnoVera — App</title>
<meta name="description" content="Search and filter natural fibre clothing by composition. Verified data from trusted retailers.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1A1814;
  --bg2: #141210;
  --cream: #F4F0E8;
  --ink: #E0DBD2;
  --ink2: #8A857E;
  --ink3: #5A5650;
  --gold: #A68B4B;
  --gold-light: #C8AD6A;
  --green: #4A7A5B;
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'DM Sans', 'Segoe UI', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--sans); background: var(--bg); color: var(--ink); line-height: 1.6; -webkit-font-smoothing: antialiased; }

/* ═══ NAV ═══ */
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(26,24,20,.88); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid rgba(166,139,75,.1); transition: box-shadow .3s; }
nav.scrolled { box-shadow: 0 1px 20px rgba(0,0,0,.3); }
.nav-inner { max-width: 960px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; }
.nav-brand { font-family: var(--serif); font-size: 1.15rem; font-weight: 700; text-decoration: none; letter-spacing: .01em; }
.nav-brand .linno { color: var(--ink); }
.nav-brand .vera { color: var(--gold); font-style: italic; }
.nav-links { display: flex; align-items: center; gap: 28px; list-style: none; }
.nav-links a { font-size: .6rem; font-weight: 400; color: var(--ink3); text-decoration: none; letter-spacing: .15em; text-transform: uppercase; transition: color .3s; position: relative; }
.nav-links a:hover { color: var(--ink); }
.nav-links a.active { color: var(--gold); }
.nav-links a.active::after { content: ''; position: absolute; bottom: -4px; left: 0; right: 0; height: 1px; background: var(--gold); }
.nav-cta { padding: 7px 18px !important; border: 1px solid var(--gold) !important; color: var(--gold) !important; letter-spacing: .2em !important; transition: all .3s !important; }
.nav-cta:hover { background: var(--gold) !important; color: var(--bg) !important; }
.nav-cta::after { display: none !important; }
.menu-toggle { display: none; background: none; border: none; cursor: pointer; padding: 6px; }
.menu-toggle span { display: block; width: 18px; height: 1.5px; background: var(--ink2); margin: 4px 0; }

/* ═══ APP EMBED ═══ */
.app-frame {
  margin-top: 56px;
  width: 100%;
  height: calc(100vh - 56px);
  position: relative;
}
.app-frame iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}
.app-loading {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  z-index: 1;
  transition: opacity .5s ease;
}
.app-loading.hidden { opacity: 0; pointer-events: none; }
.app-loading .brand {
  font-family: var(--serif);
  font-size: 1.6rem;
  font-weight: 700;
  margin-bottom: 20px;
}
.app-loading .brand .linno { color: var(--ink); }
.app-loading .brand .vera { color: var(--gold); font-style: italic; }
.app-spinner {
  width: 24px; height: 24px;
  border: 2px solid var(--ink3);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.app-loading p { margin-top: 14px; font-size: .75rem; color: var(--ink3); }

/* ═══ PLACEHOLDER ═══ */
.app-placeholder {
  margin-top: 56px;
  min-height: calc(100vh - 56px);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 24px;
}
.placeholder-inner { max-width: 440px; }
.placeholder-inner h1 {
  font-family: var(--serif);
  font-size: 1.8rem;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 12px;
}
.placeholder-inner p {
  font-size: .85rem;
  color: var(--ink2);
  margin-bottom: 32px;
  line-height: 1.7;
}
.placeholder-cta {
  display: inline-block;
  padding: 14px 36px;
  border: 1px solid var(--gold);
  color: var(--gold);
  font-family: var(--sans);
  font-size: .6rem;
  letter-spacing: .3em;
  text-transform: uppercase;
  text-decoration: none;
  transition: all .35s;
}
.placeholder-cta:hover { background: var(--gold); color: var(--bg); }

@media (max-width: 680px) {
  .menu-toggle { display: block; }
  .nav-links { display: none; position: absolute; top: 56px; left: 0; right: 0; background: rgba(26,24,20,.96); backdrop-filter: blur(16px); flex-direction: column; padding: 20px 24px; gap: 16px; border-bottom: 1px solid rgba(166,139,75,.1); }
  .nav-links.open { display: flex; }
}
</style>
</head>
<body>

<!-- ═══ NAV ═══ -->
<nav id="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-brand"><span class="linno">Linno</span><span class="vera">Vera</span></a>
    <button class="menu-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="app.html" class="active">App</a></li>
      <li><a href="editorial.html">Editorial</a></li>
      <li><a href="pitch.html">Investors</a></li>
      <li><a href="app.html" class="nav-cta">Try LinnoVera</a></li>
    </ul>
  </div>
</nav>

<div class="app-frame">
  <div class="app-loading" id="appLoading">
    <div class="brand"><span class="linno">Linno</span><span class="vera">Vera</span></div>
    <div class="app-spinner"></div>
    <p>Loading your fibre search…</p>
  </div>
  <iframe
    src="https://linnovera-app.vercel.app/"
    title="LinnoVera App"
    allow="clipboard-write"
    onload="document.getElementById('appLoading').classList.add('hidden')"
  ></iframe>
</div>

<script>
window.addEventListener('scroll', () => {
  document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 20);
});
</script>

</body>
</html>
